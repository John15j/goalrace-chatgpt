<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GOALRACE ENGINE ADMIN</title>

<link rel="stylesheet" href="style.css">

</head>

<body class="admin-page">

<div class="admin-container">

<header class="admin-header">

    <div>
        <h1>GOALRACE ENGINE</h1>
        <p>Administrator Dashboard</p>
    </div>

    <div class="connection-box">

        <span id="connectionDot"></span>

        <span id="connectionText">
            Connecting...
        </span>

    </div>

</header>

<div class="admin-grid">

    <section class="card">

        <h2>Server Status</h2>

        <p>Running</p>

    </section>

    <section class="card">

        <h2>Connected Clients</h2>

        <h1 id="clientCount">0</h1>

    </section>

    <section class="card">

        <h2>Match Status</h2>

        <p>Waiting for Match...</p>

    </section>

    <section class="card">

        <h2>Live Event Console</h2>

        <div id="eventConsole">

        </div>

    </section>

    <section class="card controls">

        <h2>Future Test Controls</h2>

       <button id="likeBtn">Like</button>

<button id="commentBtn">Comment</button>

<button id="giftBtn">Gift</button>

<button id="followBtn">Follow</button>

    </section>

</div>

</div>

<script src="js/websocketClient.js"></script>
<script src="admin.js"></script>

</body>

</html>
