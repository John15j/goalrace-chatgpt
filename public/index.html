<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GOALRACE ENGINE</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="broadcastViewport">

<div id="broadcast">

    <!-- ====================================== -->
    <!-- HEADER -->
    <!-- ====================================== -->

    <header id="broadcastHeader">

        <div id="matchTimer">
            00:00
        </div>

        <div id="serverStatus">

            <span id="connectionDot"></span>

            <span id="connectionText">
                Connecting...
            </span>

        </div>

        <div id="totalLikes">
            ❤️ 0
        </div>

    </header>

    <!-- ====================================== -->
    <!-- MAIN -->
    <!-- ====================================== -->

    <main id="broadcastMain">

        <!-- Stadium -->
        <section id="stadiumLayer">

    
<div id="stadiumBackground">

    <div id="fieldArea"></div>

    <div id="spawnTunnel"></div>

    <div class="bench bench1"></div>
    <div class="bench bench2"></div>
    <div class="bench bench3"></div>
    <div class="bench bench4"></div>
    <div class="bench bench5"></div>
    <div class="bench bench6"></div>
    <div class="bench bench7"></div>
    <div class="bench bench8"></div>

</div>

<div id="playerLayer"></div>

<div id="effectsLayer"></div>

<div id="stadiumPlaceholder">

        </section>

        <!-- HUD -->

        <aside id="hudLayer">

            <div id="liveFeed">
                test feed
            </div>

            <div id="eventHistory"></div>

        </aside>

    </main>

    <!-- ====================================== -->
    <!-- FOOTER -->
    <!-- ====================================== -->

    <footer id="broadcastFooter">

        <div id="scoreboard">

            <div class="countryScore" id="score-honduras">
                🇭🇳 Honduras <span>0</span>
            </div>

            <div class="countryScore" id="score-mexico">
                🇲🇽 Mexico <span>0</span>
            </div>

            <div class="countryScore" id="score-guatemala">
                🇬🇹 Guatemala <span>0</span>
            </div>

            <div class="countryScore" id="score-elsalvador">
                🇸🇻 El Salvador <span>0</span>
            </div>

            <div class="countryScore" id="score-nicaragua">
                🇳🇮 Nicaragua <span>0</span>
            </div>

            <div class="countryScore" id="score-costarica">
                🇨🇷 Costa Rica <span>0</span>
            </div>

            <div class="countryScore" id="score-panama">
                🇵🇦 Panama <span>0</span>
            </div>

            <div class="countryScore" id="score-usa">
                🇺🇸 USA <span>0</span>
            </div>

        </div>

    </footer>

</div>

</div>

<script src="js/websocketClient.js"></script>
<script src="game.js"></script>

</body>

</html>
