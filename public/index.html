<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GOALRACE ENGINE</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="broadcast">

    <header>

        <div id="matchTimer">
            00:00
        </div>

        <div id="serverStatus">

            <span id="connectionDot"></span>

            <span id="connectionText">
                Connecting...
            </span>

        </div>

        <div id="totalLikes">

            ❤️ 0

        </div>

    </header>

    <main>

        <section id="stadiumPlaceholder">

            <div class="placeholderText">

                3D STADIUM
                <br>
                (Coming Phase 4)

            </div>

        </section>

    </main>

    <footer>

<div id="scoreboard">

    <div class="countryScore" id="score-honduras">🇭🇳 Honduras <span>0</span></div>

    <div class="countryScore" id="score-mexico">🇲🇽 Mexico <span>0</span></div>

    <div class="countryScore" id="score-guatemala">🇬🇹 Guatemala <span>0</span></div>

    <div class="countryScore" id="score-elsalvador">🇸🇻 El Salvador <span>0</span></div>

    <div class="countryScore" id="score-nicaragua">🇳🇮 Nicaragua <span>0</span></div>

    <div class="countryScore" id="score-costarica">🇨🇷 Costa Rica <span>0</span></div>

    <div class="countryScore" id="score-panama">🇵🇦 Panama <span>0</span></div>

    <div class="countryScore" id="score-usa">🇺🇸 USA <span>0</span></div>

</div>

    </footer>

</div>
<div id="liveFeed">test feed</div>


<script src="js/websocketClient.js"></script>
<script src="game.js"></script>

</body>

</html>
